<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Smart Visit Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#fff9f0] min-h-screen">
  <div class="max-w-md mx-auto bg-white min-h-screen shadow-xl">
    <!-- Header -->
    <div class="p-4 border-b flex items-center gap-4">
      <a href="index.html" class="text-2xl">←</a>
      <h1 class="font-bold text-xl">AI Smart Visit Planner</h1>
    </div>

    <div class="p-6 space-y-8">
      <!-- Location -->
      <div>
        <label class="block text-sm font-medium mb-2">1. Location</label>
        <div class="bg-amber-50 p-4 rounded-2xl">
          <p class="font-medium">Vị trí hiện tại của bạn</p>
          <p class="text-sm text-gray-600">Quận 1, TP.HCM • Cách 1.2km</p>
        </div>
      </div>

      <!-- Preferred Area -->
      <div>
        <label class="block text-sm font-medium mb-2">Preferred Area</label>
        <select id="area" class="w-full p-4 border rounded-2xl bg-white">
          <option value="">Chọn khu vực</option>
          <option value="q1">Quận 1</option>
          <option value="q3">Quận 3</option>
          <option value="q5">Quận 5</option>
          <option value="q7">Quận 7</option>
          <option value="q10">Quận 10</option>
        </select>
      </div>

      <!-- Drink Preference -->
      <div>
        <label class="block text-sm font-medium mb-2">Drink Preference</label>
        <div class="grid grid-cols-3 gap-3">
          <button class="drink-btn p-4 border-2 border-amber-200 rounded-2xl hover:border-amber-600">Cà Phê</button>
          <button class="drink-btn p-4 border-2 border-amber-200 rounded-2xl hover:border-amber-600">Matcha</button>
          <button class="drink-btn p-4 border-2 border-amber-200 rounded-2xl hover:border-amber-600">Trà</button>
        </div>
      </div>

      <!-- Group Size -->
      <div>
        <label class="block text-sm font-medium mb-2">Group Size</label>
        <div class="grid grid-cols-4 gap-3">
          <button class="group-btn p-3 border rounded-2xl text-center">1<br><span class="text-xs">Một mình</span></button>
          <button class="group-btn p-3 border rounded-2xl text-center">2-3<br><span class="text-xs">Nhỏ</span></button>
          <button class="group-btn p-3 border rounded-2xl text-center">4-6<br><span class="text-xs">Nhóm</span></button>
          <button class="group-btn p-3 border rounded-2xl text-center">7+<br><span class="text-xs">Lớn</span></button>
        </div>
      </div>
    </div>

    <!-- Big Button -->
    <div class="p-6 fixed bottom-0 left-0 right-0 max-w-md mx-auto">
      <button onclick="startLoading()" 
              class="w-full bg-orange-500 hover:bg-orange-600 text-white py-6 rounded-3xl text-xl font-semibold shadow-lg">
        Find My Best Store +
      </button>
    </div>
  </div>

  <script>
    function startLoading() {
      window.location.href = "loading.html";
    }
  </script>
</body>
</html>
