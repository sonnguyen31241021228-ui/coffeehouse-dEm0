<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Coffee House</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#fff9f0]">
  <div class="max-w-md mx-auto bg-white min-h-screen shadow-xl overflow-hidden">
    <!-- Header giống app -->
    <div class="bg-white p-4 flex justify-between items-center border-b">
      <div class="flex items-center gap-3">
        <span class="text-3xl">☕</span>
        <div>
          <p class="text-sm">Chào buổi sáng!</p>
          <p class="text-amber-800 font-medium">Cà Phê nhé!</p>
        </div>
      </div>
      <div class="flex gap-4">
        <div class="bg-amber-100 px-4 py-1 rounded-full text-sm">15</div>
        <i class="fa-solid fa-bell text-2xl"></i>
      </div>
    </div>

    <div class="p-6">
      <h1 class="text-2xl font-bold">THE COFFEE HOUSE</h1>
      
      <!-- AI Smart Visit Planner Button -->
      <a href="planner.html" class="block mt-8 bg-gradient-to-r from-orange-400 to-amber-600 text-white p-6 rounded-3xl">
        <div class="flex justify-between">
          <div>
            <span class="text-4xl">🤖</span>
            <p class="font-semibold mt-4">Nhà</p>
            <p class="text-sm opacity-90">Tìm quán hợp nhất cho bạn ngay lúc này</p>
          </div>
        </div>
      </a>
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t py-3 flex justify-around text-xs">
      <div class="text-amber-600 flex flex-col items-center"><i class="fa-solid fa-house"></i><span>Trang chủ</span></div>
      <div class="flex flex-col items-center text-gray-500"><i class="fa-solid fa-mug-hot"></i><span>Đặt hàng</span></div>
      <div class="flex flex-col items-center text-gray-500"><i class="fa-solid fa-store"></i><span>Cửa hàng</span></div>
      <div class="flex flex-col items-center text-gray-500"><i class="fa-solid fa-gift"></i><span>Ưu đãi</span></div>
    </div>
  </div>
</body>
</html>
