<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Coffee House</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .hero { background: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)), url('https://thecoffeehouse.com/cdn/shop/files/hero.jpg') center/cover no-repeat; }
  </style>
</head>
<body class="bg-white">

  <!-- Navigation -->
  <nav class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-8">
        <h1 class="text-3xl font-bold text-amber-900">THE COFFEE HOUSE</h1>
        <div class="space-x-8 text-sm font-medium">
          <a href="#" class="hover:text-amber-700">Thực đơn</a>
          <a href="#" class="hover:text-amber-700">Ưu đãi</a>
          <a href="map.html" class="text-amber-700 font-semibold">Cửa hàng</a>
          <a href="#" class="hover:text-amber-700">Về chúng tôi</a>
        </div>
      </div>
      <div class="flex items-center gap-6">
        <button class="bg-amber-800 text-white px-8 py-3 rounded-full hover:bg-amber-900 transition">Đặt hàng online</button>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <div class="hero h-screen flex items-center text-white">
    <div class="max-w-7xl mx-auto px-6">
      <h2 class="text-6xl font-bold leading-tight mb-6">Nụ cười là hương vị<br>ngọt ngào nhất</h2>
      <p class="text-2xl mb-10 max-w-md">Trải nghiệm vị giác đa dạng và thú vị tại The Coffee House</p>
      <a href="map.html" class="inline-block bg-white text-amber-900 px-10 py-4 rounded-full text-lg font-semibold hover:scale-105 transition">
        Tìm cửa hàng gần bạn
      </a>
    </div>
  </div>

  <!-- Các phần khác (giống website) -->
  <div class="max-w-7xl mx-auto px-6 py-20">
    <h3 class="text-4xl font-bold text-center mb-12">Cửa hàng gần bạn</h3>
    <div class="grid grid-cols-3 gap-8">
      <!-- Sẽ load từ map.html hoặc data -->
      <div onclick="window.location='map.html'" class="cursor-pointer group">
        <img src="https://picsum.photos/id/1015/600/400" class="rounded-3xl w-full h-64 object-cover group-hover:scale-105 transition">
        <p class="font-semibold mt-4">The Coffee House Nguyễn Thái Bình</p>
        <p class="text-sm text-gray-600">Quận 1, TP.HCM</p>
      </div>
      <!-- Thêm nhiều card khác -->
    </div>
  </div>

  <footer class="bg-amber-900 text-white py-12 text-center">
    <p>© 2026 The Coffee House. All rights reserved.</p>
  </footer>
</body>
</html>
